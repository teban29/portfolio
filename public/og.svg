<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0b1a"/>
      <stop offset="100%" stop-color="#1a1033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d4aff"/>
      <stop offset="100%" stop-color="#8b6bff"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d4aff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6d4aff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b6bff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6d4aff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Blobs -->
  <circle cx="250" cy="150" r="200" fill="url(#blob1)" filter="url(#blur1)"/>
  <circle cx="900" cy="450" r="180" fill="url(#blob2)" filter="url(#blur1)"/>
  <circle cx="600" cy="300" r="120" fill="#6d4aff" opacity="0.06" filter="url(#blur2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Accent line -->
  <rect x="100" y="190" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Name -->
  <text x="100" y="280" font-family="'Sora', system-ui, sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="-0.03">
    Esteban
    <tspan x="100" y="350" font-family="'Sora', system-ui, sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="-0.03">Cardona</tspan>
  </text>

  <!-- Role -->
  <text x="100" y="420" font-family="'Sora', system-ui, sans-serif" font-size="22" fill="#a0a0b0" letter-spacing="0.02">
    Desarrollador Full-Stack Freelance
  </text>

  <!-- Tech tags -->
  <g transform="translate(100, 470)">
    <rect x="0" y="0" width="70" height="30" rx="15" fill="white" opacity="0.08"/>
    <text x="35" y="20" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a0a0b0" text-anchor="middle">Python</text>
    <rect x="82" y="0" width="52" height="30" rx="15" fill="white" opacity="0.08"/>
    <text x="108" y="20" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a0a0b0" text-anchor="middle">React</text>
    <rect x="146" y="0" width="52" height="30" rx="15" fill="white" opacity="0.08"/>
    <text x="172" y="20" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a0a0b0" text-anchor="middle">Astro</text>
    <rect x="210" y="0" width="38" height="30" rx="15" fill="white" opacity="0.08"/>
    <text x="229" y="20" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a0a0b0" text-anchor="middle">Go</text>
  </g>
</svg>
